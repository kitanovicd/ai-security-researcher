services:
  db:
    image: pgvector/pgvector:pg16
    container_name: audits-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: audits
      POSTGRES_USER: audit
      POSTGRES_PASSWORD: audit
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  pgdata:
